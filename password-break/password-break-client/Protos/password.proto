syntax = "proto3";

option csharp_namespace = "password_break_client";

package password;

service PasswordBreaker {
  rpc Connect(stream ClientMessage) returns (stream ServerMessage);
}

message ClientMessage {
  oneof message {
    Heartbeat heartbeat = 1;
    Result result = 2;
    Ready ready = 3;
    Hello hello = 4;
  }
}

message Hello {
  int64 wordlist_timestamp = 1;
}

message ServerMessage {
  oneof message {
    HashTask hash_task = 1;
    Ack ack = 2;
    Config config = 3;
  }
}

message Heartbeat {}

message Ready {}

message Result {
  string task_id = 1;
  repeated FoundPassword found = 2;
}

message FoundPassword {
  string password = 1;
  string hash = 2;
}

message HashTask {
  string task_id = 1;
  repeated string target_hashes = 2;
  int64 start_index = 3;
  int64 end_index = 4;
}

message Config {
  int32 chunk_size = 1;
  int64 wordlist_timestamp = 2;
  repeated string target_hashes = 3;
  oneof attack_config {
    BruteForceConfig brute_force = 4;
    DictionaryConfig dictionary = 5;
  }
  int32 heartbeat_interval_seconds = 6;
}

message BruteForceConfig {
  string charset = 1;
  int32 min_length = 2;
  int32 max_length = 3;
}

message DictionaryConfig {
  string wordlist_path = 1;
}

message Ack {
  string message = 1;
}