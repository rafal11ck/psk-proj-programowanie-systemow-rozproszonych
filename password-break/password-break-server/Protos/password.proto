syntax = "proto3";

option csharp_namespace = "password_break_server";

package password;

service PasswordBreaker {
  rpc Connect(stream ClientMessage) returns (stream ServerMessage);
}

message ClientMessage {
  oneof message {
    Heartbeat heartbeat = 1;
    Result result = 2;
    Ready ready = 3;
  }
}

message ServerMessage {
  oneof message {
    HashTask hash_task = 1;
    Ack ack = 2;
    Config config = 3;
  }
}

message Heartbeat {
  string task_id = 1;
}

message Ready {}

message Result {
  string task_id = 1;
  repeated PasswordHash hashes = 2;
}

message PasswordHash {
  string password = 1;
  string hash = 2;
}

message HashTask {
  string task_id = 1;
  oneof data {
    BruteForceRange brute_force = 2;
    WordList words = 3;
  }
}

message BruteForceRange {
  string charset = 1;
  int32 length = 2;
  int64 start_index = 3;
  int64 end_index = 4;
}

message WordList {
  repeated string words = 1;
}

message Config {
  string attack_mode = 1;
  string charset = 2;
  int32 min_length = 3;
  int32 max_length = 4;
  int32 chunk_size = 5;
}

message Ack {
  string message = 1;
}