syntax = "proto3";

option csharp_namespace = "password_break_server";

package password;

service PasswordBreaker {
  rpc Connect(stream ClientMessage) returns (stream ServerMessage);
}

message ClientMessage {
  oneof message {
    Heartbeat heartbeat = 1;
    Result result = 2;
    Ready ready = 3;
    Hello hello = 4;
  }
}

message Hello {
  int64 wordlist_timestamp = 1;
}

message ServerMessage {
  oneof message {
    HashTask hash_task = 1;
    Ack ack = 2;
    Config config = 3;
  }
}

message Heartbeat {}

message Ready {}

message Result {
  string task_id = 1;
  repeated FoundPassword found = 2;
}

message FoundPassword {
  string password = 1;
  string hash = 2;
}

message HashTask {
  string task_id = 1;
  repeated string target_hashes = 2;
  int64 start_index = 3;
  int64 end_index = 4;
}

message Config {
  int32 chunk_size = 1;
  int64 wordlist_timestamp = 2;
  repeated string target_hashes = 3;
  oneof attack_config {
    BruteForceConfig brute_force = 4;
    DictionaryConfig dictionary = 5;
  }
  int32 heartbeat_interval_seconds = 6;
}

message BruteForceConfig {
  string charset = 1;
  int32 min_length = 2;
  int32 max_length = 3;
}

message DictionaryConfig {
  string wordlist_path = 1;
}

message Ack {
  string message = 1;
}

// Monitor service — server-streaming events for TUI monitor client
service Monitor {
  rpc Subscribe(SubscribeRequest) returns (stream MonitorEvent);
}

message SubscribeRequest {}

message MonitorEvent {
  oneof event {
    StateSnapshot snapshot = 1;
    ClientConnectedEvent client_connected = 2;
    ClientDisconnectedEvent client_disconnected = 3;
    TaskAssignedEvent task_assigned = 4;
    TaskCompletedEvent task_completed = 5;
    TaskRequeuedEvent task_requeued = 6;
    PasswordFoundEvent password_found = 7;
  }
}

message StateSnapshot {
  int32 completed_tasks = 1;
  int32 total_tasks = 2;
  int32 pending_tasks = 3;
  int32 found_count = 4;
  int32 remaining_count = 5;
  bool all_found = 6;
  bool saved = 7;
  string attack_mode = 8;
  repeated ClientInfo clients = 9;
  repeated ActiveTask active_tasks = 10;
}

message ClientInfo {
  string client_id = 1;
  string ip = 2;
  int32 seconds_ago = 3;
  int32 timeout_remaining = 4;
}

message ActiveTask {
  string task_id = 1;
  string client_id = 2;
  int64 start_index = 3;
  int64 end_index = 4;
  int32 elapsed_seconds = 5;
}

message ClientConnectedEvent {
  string client_id = 1;
  string ip = 2;
}

message ClientDisconnectedEvent {
  string client_id = 1;
}

message TaskAssignedEvent {
  string client_id = 1;
  string task_id = 2;
  int64 start_index = 3;
  int64 end_index = 4;
}

message TaskCompletedEvent {
  string task_id = 1;
}

message TaskRequeuedEvent {
  string task_id = 1;
}

message PasswordFoundEvent {
  string password = 1;
  string hash = 2;
}